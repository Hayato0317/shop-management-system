<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}商品管理システム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-shop me-2"></i>ShopSystem
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-cart3 me-1"></i>レジ（POS）
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/customers' in request.path %}active{% endif %}" href="/customers">
            <i class="bi bi-people me-1"></i>顧客管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/products' %}active{% endif %}" href="/products">
            <i class="bi bi-box-seam me-1"></i>商品管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
            <i class="bi bi-clock-history me-1"></i>購入履歴
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
