{% extends "base.html" %}
{% block title %}購入履歴{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <h4 class="mb-0 fw-bold"><i class="bi bi-clock-history text-primary me-2"></i>購入履歴</h4>
  <span id="totalBadge" class="badge bg-secondary ms-auto fs-6">読み込み中...</span>
</div>

<!-- フィルタ -->
<div class="card shadow-sm mb-4">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-md-4">
        <div class="input-group input-group-sm">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input id="historySearch" type="text" class="form-control" placeholder="顧客名で絞り込み...">
        </div>
      </div>
      <div class="col-md-3">
        <input id="dateFrom" type="date" class="form-control form-control-sm" placeholder="開始日">
      </div>
      <div class="col-md-3">
        <input id="dateTo" type="date" class="form-control form-control-sm" placeholder="終了日">
      </div>
      <div class="col-md-2">
        <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetFilter()">
          <i class="bi bi-x-circle me-1"></i>リセット
        </button>
      </div>
    </div>
  </div>
</div>

<!-- サマリーカード -->
<div class="row g-3 mb-4" id="summaryCards">
  <div class="col-md-4">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <div class="text-muted small">総取引件数</div>
        <div class="fs-2 fw-bold text-primary" id="sumCount">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <div class="text-muted small">総売上（税込）</div>
        <div class="fs-2 fw-bold text-success" id="sumRevenue">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <div class="text-muted small">平均購入額</div>
        <div class="fs-2 fw-bold text-warning" id="sumAvg">—</div>
      </div>
    </div>
  </div>
</div>

<!-- テーブル -->
<div class="card shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>日時</th>
            <th>顧客</th>
            <th class="text-end">合計（税込）</th>
            <th class="text-end">割引</th>
            <th class="text-center">詳細</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 明細モーダル -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-receipt me-2"></i>購入明細</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
<script>
  initHistory();
</script>
{% endblock %}
