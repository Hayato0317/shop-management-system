{% extends "base.html" %}
{% block title %}商品管理{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <h4 class="mb-0 fw-bold"><i class="bi bi-box-seam text-primary me-2"></i>商品管理</h4>
  <button class="btn btn-outline-secondary btn-sm ms-auto" data-bs-toggle="modal" data-bs-target="#categoryModal">
    <i class="bi bi-tag me-1"></i>カテゴリー管理
  </button>
  <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addProductModal">
    <i class="bi bi-plus-lg me-1"></i>商品を追加
  </button>
</div>

<!-- カテゴリーフィルター -->
<div class="mb-3 d-flex flex-wrap gap-1" id="productCategoryTabs">
  <button class="btn btn-sm btn-primary" onclick="filterProducts(null)" id="pcat-all">すべて</button>
</div>

<!-- 商品テーブル -->
<div class="card shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width:3rem">#</th>
            <th style="width:3rem">絵文字</th>
            <th>商品名</th>
            <th>カテゴリー</th>
            <th class="text-end">税抜価格</th>
            <th class="text-end">税込価格</th>
            <th class="text-center">税区分</th>
            <th class="text-center">操作</th>
          </tr>
        </thead>
        <tbody id="productTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- カテゴリー管理モーダル -->
<div class="modal fade" id="categoryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-tag me-2"></i>カテゴリー管理</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 mb-3">
          <input id="newCategoryName" type="text" class="form-control" placeholder="新しいカテゴリー名（例: 日用品）">
          <button class="btn btn-primary" onclick="createCategory()">追加</button>
        </div>
        <div id="categoryError" class="alert alert-danger d-none"></div>
        <ul class="list-group" id="categoryList"></ul>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
      </div>
    </div>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-plus-lg me-2"></i>商品を追加</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="addProductError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">商品名 <span class="text-danger">*</span></label>
          <input id="addPName" type="text" class="form-control" placeholder="例: コーラ（500ml）">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">カテゴリー</label>
          <select id="addPCategory" class="form-select">
            <option value="">未分類</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">税抜価格（円） <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">¥</span>
            <input id="addPPrice" type="number" class="form-control" placeholder="150" min="1">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">税区分 <span class="text-danger">*</span></label>
          <select id="addPTax" class="form-select">
            <option value="standard">標準税率（10%）</option>
            <option value="reduced">軽減税率（8%）— 食料品など</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">絵文字アイコン</label>
          <input id="addPEmoji" type="text" class="form-control" placeholder="🛍️" maxlength="4">
          <div class="form-text">1文字の絵文字を入力（任意）</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary" onclick="createProduct()">
          <i class="bi bi-check2 me-1"></i>追加する
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal fade" id="editProductModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>商品を編集</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="editPId" type="hidden">
        <div id="editProductError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">商品名 <span class="text-danger">*</span></label>
          <input id="editPName" type="text" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">カテゴリー</label>
          <select id="editPCategory" class="form-select">
            <option value="">未分類</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">税抜価格（円） <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">¥</span>
            <input id="editPPrice" type="number" class="form-control" min="1">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">税区分 <span class="text-danger">*</span></label>
          <select id="editPTax" class="form-select">
            <option value="standard">標準税率（10%）</option>
            <option value="reduced">軽減税率（8%）— 食料品など</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">絵文字アイコン</label>
          <input id="editPEmoji" type="text" class="form-control" maxlength="4">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary" onclick="updateProduct()">
          <i class="bi bi-check2 me-1"></i>更新する
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
<script>
  initProducts();
</script>
{% endblock %}
